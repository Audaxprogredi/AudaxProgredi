<!DOCTYPE html>
<html lang="es">
<head>
    
    <title>Currículum Vitae</title>
   
</head>
<body>

    <h1>Nombre</h1>
    <p>Profesión</p>
    
    <p class="datos">
        Teléfono | Email | LinkedIn | Ciudad, País
    </p>

    <h2>Perfil</h2>
    <p>Descripción</p>

    <h2>Experiencia</h2>
    <p><strong>Puesto</strong> <span class="fecha">(Fecha Inicio - Fecha Fin)</span></p>
    <p>Empresa</p>
    <ul>
        <li>Logro</li>
        <li>Responsabilidad</li>
    </ul>

    <h2>Educación</h2>
    <p><strong>Título</strong> <span class="fecha">(Año)</span></p>
    <p>Institución</p>

    <h2>Habilidades</h2>
    <ul>
        <li>Habilidad</li>
        <li>Habilidad</li>
    </ul>

    <h2>Idiomas</h2>
    <p>Idioma - Nivel</p>

</body>
</html>
