<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currículum Vitae</title>
    <style>
        body {
            font-family: sans-serif;
            line-height: 1.5;
            color: #333;
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 {
            margin-bottom: 5px;
        }
        h2 {
            border-bottom: 1px solid #ccc;
            padding-bottom: 3px;
            margin-top: 30px;
        }
        .datos {
            color: #666;
            margin-bottom: 20px;
        }
        .fecha {
            color: #777;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <h1>Nombre</h1>
    <p>Profesión</p>
    
    <p class="datos">
        Teléfono | Email | LinkedIn | Ciudad, País
    </p>

    <h2>Perfil</h2>
    <p>Descripción</p>

    <h2>Experiencia</h2>
    <p><strong>Puesto</strong> <span class="fecha">(Fecha Inicio - Fecha Fin)</span></p>
    <p>Empresa</p>
    <ul>
        <li>Logro</li>
        <li>Responsabilidad</li>
    </ul>

    <h2>Educación</h2>
    <p><strong>Título</strong> <span class="fecha">(Año)</span></p>
    <p>Institución</p>

    <h2>Habilidades</h2>
    <ul>
        <li>Habilidad</li>
        <li>Habilidad</li>
    </ul>

    <h2>Idiomas</h2>
    <p>Idioma - Nivel</p>

</body>
</html>
